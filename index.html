<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #clock{
    width: 300px;
    margin: 50px auto;
    border: 3px solid black;
    border-radius: 10px;
    padding: 20px;
    background-color: rgb(116, 216, 236);
    color: rgb(255, 17, 0);
}

        
    </style>
</head>
<body style="text-align:center;"></body>
    <h1 id="clock"></h1>
    <script>
        function myclock(){
            let now = new Date();
            let h = now.getHours();
            let m = now.getMinutes();
            let s = now.getSeconds();
            let mer = "AM";
            if(h>12){
                h = h-12;
            }
            if(h>=12){
                mer = "PM";
            }
            if(h<10){
                h = "0"+h;
            }
            if(m<10){
                m = "0"+m;
            }
            if(s<10){
                s= "0"+s;
            }
            document.getElementById("clock").innerHTML=h+ ":" +m + ":"+s  +mer;
        }
         setInterval(myclock,1000)
    </script>
</body>
</html>
